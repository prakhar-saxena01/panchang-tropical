<!DOCTYPE html>
<html>
<head>
  <title>Sunrise/Sunset API Test</title>
</head>
<body>
  <h1>Sunrise/Sunset API Test</h1>
  <p>Testing sunrise-sunset.org API integration...</p>
  <div id="result"></div>

  <script>
    async function testAPI() {
      const lat = 25.3176;
      const lon = 82.9739;
      const date = new Date();
      
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const dateStr = `${year}-${month}-${day}`;
      
      try {
        const response = await fetch(
          `https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&date=${dateStr}`
        );
        const data = await response.json();
        document.getElementById('result').innerHTML = `
          <h3>API Response:</h3>
          <pre>${JSON.stringify(data, null, 2)}</pre>
          <h3>Parsed Times:</h3>
          <p>Sunrise: ${data.results.sunrise}</p>
          <p>Sunset: ${data.results.sunset}</p>
          <p>Date: ${dateStr}</p>
        `;
      } catch(error) {
        document.getElementById('result').innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
      }
    }
    
    testAPI();
  </script>
</body>
</html>
